spring:
  application:
    name: re-seat-scraper

  datasource:
    url: jdbc:mysql://localhost:3306/reseat_scraper?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

kbo:
  url: https://www.koreabaseball.com/Schedule/Schedule.aspx
  selectors:
    year: "#ddlYear"
    month: "#ddlMonth"
    series: "#ddlSeries"
    games-table: "#tblScheduleList > tbody"
  series:
    regular-season: "0,9,6"

scraper:
  # 팀/구장 기준데이터 시드와 경기 일정 수집은 각각 따로 켜고 끌 수 있다.
  seed:
    enabled: true
  collect:
    enabled: true
    # KBO 정규시즌 기준으로 실제 수집할 월 범위다.
    # 예: 2025-03 ~ 2026-10이면 각 연도에서 3~10월만 수집한다.
    month-from: 3
    month-to: 10

  # 수집 시작/종료 연월이다. 같은 월만 필요하면 시작과 종료를 같은 값으로 둔다.
  target:
    start-season: 2026
    start-month: 7
    end-season: 2026
    end-month: 7

  output-dir: ./output
